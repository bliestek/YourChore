<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourChore - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      color: white;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .emoji { font-size: 5rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem; }
    button {
      background: white;
      color: #7c3aed;
      border: none;
      padding: 1rem 2rem;
      border-radius: 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
    }
    button:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>You're Offline!</h1>
    <p>No worries! Connect to the internet to see your chores and stars.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
